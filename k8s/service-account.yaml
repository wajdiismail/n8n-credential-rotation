apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-rotator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-rotator-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "patch", "update", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-rotator-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-rotator-role
subjects:
  - kind: ServiceAccount
    name: n8n-rotator
    namespace: default
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-rotator-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: n8n-rotator
type: kubernetes.io/service-account-token
